name: Deploy To VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dtc4646_web:latest .
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dtc4646_web:latest
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push  # ensures it waits for the first job to finish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            echo "Starting deployment..."
            
            cd dashboard || { echo "Directory dashboard directory not found!"; exit 1; }
            
            # Stop and remove containers
            docker compose down --remove-orphans || echo "No containers to stop"
            
            # Pull latest image
            docker compose pull || echo "Pull failed, using existing images"
            
            # Start containers
            docker compose up -d --force-recreate
            
            # Wait for services to be healthy
            sleep 10
            
            # Check status
            docker compose ps
            
            # Clean up dangling images (safe)
            docker image prune -f
            
            echo "Deployment completed!"
